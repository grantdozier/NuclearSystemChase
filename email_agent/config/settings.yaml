  client_id: "${AZURE_CLIENT_ID}"
  client_secret: "${AZURE_CLIENT_SECRET}"
  scopes:
    - "https://graph.microsoft.com/.default"

mailbox: "chase@chasegroupcc.com"

anthropic:
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-4-6"

