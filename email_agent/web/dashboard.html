<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Agent — Chase Group CC</title>
  <meta http-equiv="refresh" content="60" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.5; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 16px; font-weight: 600; }
    header .badge { background: var(--accent); color: #000; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
    main { padding: 24px; max-width: 900px; margin: 0 auto; }
    section { margin-bottom: 32px; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 10px; }
    .card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .card .value { font-size: 20px; font-weight: 700; }
    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--muted); font-weight: 500; font-size: 12px; padding: 6px 10px; border-bottom: 1px solid var(--border); }
    td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    .tag { display: inline-block; border-radius: 4px; padding: 1px 6px; font-size: 11px; font-weight: 600; margin-right: 3px; }
    .tag.priority { background: #3d1a1a; color: var(--red); }
    .tag.budget { background: #2a2012; color: var(--yellow); }
    .tag.schedule { background: #0d2a2a; color: #56d364; }
    .tag.unmatched { background: #1c2128; color: var(--muted); }
    button { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; font-size: 13px; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }
    .error { color: var(--red); background: #3d1a1a; border: 1px solid var(--red); border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; }
    .ok { color: var(--green); }
    footer { text-align: center; color: var(--muted); font-size: 11px; padding: 24px; }
  </style>
</head>
<body>
<header>
  <h1>Email Agent</h1>
  <span class="badge">Chase Group CC</span>
  <span id="status-dot" style="margin-left:auto;font-size:12px;color:var(--muted)">Loading…</span>
</header>
<main>
  <section>
    <h2>Status</h2>
    <div id="error-box" class="error" style="display:none"></div>
    <div class="stats" id="stats">
      <div class="card"><div class="label">Last run</div><div class="value" id="stat-last">—</div></div>
      <div class="card"><div class="label">Fetched</div><div class="value" id="stat-fetched">—</div></div>
      <div class="card"><div class="label">Classified</div><div class="value" id="stat-classified">—</div></div>
      <div class="card"><div class="label">Unmatched</div><div class="value" id="stat-unmatched">—</div></div>
    </div>
    <div style="margin-top:14px">
      <button id="run-btn" onclick="runNow()">Run Now</button>
      <span id="run-status" style="margin-left:10px;color:var(--muted);font-size:12px"></span>
    </div>
  </section>

  <section>
    <h2>Recent Runs</h2>
    <div class="card" style="padding:0;overflow:hidden">
      <table id="history-table">
        <thead><tr><th>Started</th><th>Fetched</th><th>Classified</th><th>Unmatched</th><th>Duration</th><th>Error</th></tr></thead>
        <tbody id="history-body"><tr><td colspan="6" style="color:var(--muted);text-align:center;padding:20px">Loading…</td></tr></tbody>
      </table>
    </div>
  </section>
</main>
<footer>Auto-refreshes every 60 s &nbsp;·&nbsp; Email Agent</footer>

<script>
  async function loadStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      document.getElementById('status-dot').textContent = d.scheduler_running ? '● Running' : '● Stopped';
      document.getElementById('status-dot').style.color = d.scheduler_running ? 'var(--green)' : 'var(--red)';
      if (d.last_run) {
        const lr = d.last_run;
        document.getElementById('stat-last').textContent = lr.started_at ? lr.started_at.slice(0,16).replace('T',' ') : '—';
        document.getElementById('stat-fetched').textContent = lr.fetched ?? '—';
        document.getElementById('stat-classified').textContent = lr.classified ?? '—';
        document.getElementById('stat-unmatched').textContent = lr.unmatched ?? '—';
        const eb = document.getElementById('error-box');
        if (lr.error) { eb.style.display=''; eb.textContent = lr.error; }
        else { eb.style.display='none'; }
      }
    } catch(e) {
      document.getElementById('status-dot').textContent = '● Unreachable';
      document.getElementById('status-dot').style.color = 'var(--red)';
    }
  }

  async function loadHistory() {
    try {
      const r = await fetch('/api/history');
      const runs = await r.json();
      const tbody = document.getElementById('history-body');
      if (!runs.length) { tbody.innerHTML = '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:20px">No runs yet</td></tr>'; return; }
      tbody.innerHTML = runs.slice(0,20).map(run => `
        <tr>
          <td>${(run.started_at||'').slice(0,16).replace('T',' ')}</td>
          <td>${run.fetched??'—'}</td>
          <td>${run.classified??'—'}</td>
          <td>${run.unmatched??'—'}</td>
          <td>${run.duration_seconds != null ? run.duration_seconds.toFixed(1)+'s' : '—'}</td>
          <td>${run.error ? `<span style="color:var(--red)">${run.error.slice(0,60)}</span>` : '<span class="ok">OK</span>'}</td>
        </tr>`).join('');
    } catch(e) {}
  }

  async function runNow() {
    const btn = document.getElementById('run-btn');
    const st = document.getElementById('run-status');
    btn.disabled = true;
    st.textContent = 'Running…';
    try {
      const r = await fetch('/api/run', {method:'POST'});
      const d = await r.json();
      st.textContent = d.error ? '✗ ' + d.error : `✓ Done — ${d.fetched} fetched, ${d.classified} classified`;
    } catch(e) {
      st.textContent = '✗ Request failed';
    }
    btn.disabled = false;
    loadStatus();
    loadHistory();
  }

  loadStatus();
  loadHistory();
</script>
</body>
</html>
